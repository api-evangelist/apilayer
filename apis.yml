apis:
  - aid: apilayer:apilayer-api
    name: APILayer Marketplace API
    description: >-
      The APILayer Marketplace API provides access to 100+ APIs across
      geolocation, currency, weather, dev tools, marketing, finance, security,
      and AI/ML categories. Individual APIs include IPstack, Fixer,
      Currencylayer, Weatherstack, Serpstack, Mediastack, and many more,
      each with their own endpoints and authentication.
    humanURL: https://apilayer.com/
